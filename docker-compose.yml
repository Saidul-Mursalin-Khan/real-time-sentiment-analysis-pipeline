services:
  # ── Message layer ────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    volumes:
      - kafka_data:/var/lib/kafka/data
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test:
        ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic reddit-comments --partitions 8 --replication-factor 1 --config retention.ms=3600000 ;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic cleaned-comments --partitions 8 --replication-factor 1 --config retention.ms=3600000 ;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic labeled-train-data --partitions 4 --replication-factor 1 --config retention.ms=3600000 ;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic model-version --partitions 1 --replication-factor 1 --config retention.ms=86400000 ;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inference-request --partitions 4 --replication-factor 1 --config retention.ms=3600000 ;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inference-response --partitions 4 --replication-factor 1 --config retention.ms=3600000 ;
      kafka-configs --bootstrap-server kafka:9092 --entity-type topics --entity-name reddit-comments --alter --add-config retention.ms=3600000 ;
      kafka-configs --bootstrap-server kafka:9092 --entity-type topics --entity-name cleaned-comments --alter --add-config retention.ms=3600000 ;
      kafka-configs --bootstrap-server kafka:9092 --entity-type topics --entity-name labeled-train-data --alter --add-config retention.ms=3600000 ;
      kafka-configs --bootstrap-server kafka:9092 --entity-type topics --entity-name model-version --alter --add-config retention.ms=86400000 ;
      kafka-configs --bootstrap-server kafka:9092 --entity-type topics --entity-name inference-request --alter --add-config retention.ms=3600000 ;
      kafka-configs --bootstrap-server kafka:9092 --entity-type topics --entity-name inference-response --alter --add-config retention.ms=3600000 ;
      echo 'Topics created and configs synced.'
      "
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Database ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: sentiment
      POSTGRES_USER: sentiment
      POSTGRES_PASSWORD: sentiment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentiment -d sentiment"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  # flink-jobmanager and flink-taskmanager removed — not needed (all jobs run in local mode)

  # ── Data provider (Kafka producer — replays .zst file) ───────────────────
  data-provider:
    build: ./data-provider
    container_name: data-provider
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./dataset/RC_2019-04.zst:/app/RC_2019-04.zst:ro
    environment:
      SPEED_FACTOR: "100"
      KAFKA_BROKER: "kafka:9092"
      KAFKA_TOPIC: "reddit-comments"

  # ── Preprocess (reddit-comments → cleaned-comments) ─────────────────────
  preprocess-flink:
    build: ./preprocess-flink
    container_name: preprocess-flink
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  # ── Labeling (cleaned-comments → labeled-train-data) ─────────────────────
  labeling-flink:
    build: ./labeling-flink
    container_name: labeling-flink
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  # ── Inference (cleaned-comments → predictions) ───────────────────────────
  inference-flink:
    build: ./inference-flink
    container_name: inference-flink
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - model-storage:/models:ro
    environment:
      MODEL_DIR: /models
      INFERENCE_PARALLELISM: "8"
      MODEL_RELOAD_INTERVAL_SEC: "5"
      INFERENCE_LOG_EVERY_N: "20000"
      INFERENCE_BATCH_SIZE: "128"
      INFERENCE_MAX_WAIT_MS: "200"

  # ── Trainer (Kafka consumer → trains model) ──────────────────────────────
  trainer:
    build: ./train-consumer
    container_name: trainer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - model-storage:/models
      - ./train-consumer/data/oracle_dataset_clean.csv:/app/oracle_dataset_clean.csv:ro
    environment:
      MODEL_DIR: /models
      ORACLE_PATH: /app/oracle_dataset_clean.csv
      DB_HOST: postgres
      DB_NAME: sentiment
      DB_USER: sentiment
      DB_PASS: sentiment

  # ── Model training (run once, then exit) ─────────────────────────────────
  # model-trainer:
  #   build: ./ml-model
  #   container_name: model-trainer
  #   profiles: ["train"]
  #   volumes:
  #     - ./dataset/RC_2019-04.zst:/app/dataset/RC_2019-04.zst:ro
  #     - ./ml-model/model:/app/model
  #   environment:
  #     ZST_FILE: /app/dataset/RC_2019-04.zst
  #     MODEL_DIR: /app/model
  #     MAX_SAMPLES: "300000"
  #     RETRAIN_POLL: "false"

  # ── Retraining daemon (polls DB for signals) ─────────────────────────────
  # model-retrainer:
  #   build: ./ml-model
  #   container_name: model-retrainer
  #   profiles: ["retrain"]
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./dataset/RC_2019-04.zst:/app/dataset/RC_2019-04.zst:ro
  #     - ./ml-model/model:/app/model
  #   environment:
  #     ZST_FILE: /app/dataset/RC_2019-04.zst
  #     MODEL_DIR: /app/model
  #     MAX_SAMPLES: "300000"
  #     RETRAIN_POLL: "true"
  #     DB_HOST: postgres
  #     DB_PORT: "5432"
  #     DB_NAME: sentiment
  #     DB_USER: sentiment
  #     DB_PASS: sentiment

  # ───────────────── FAST_API ──────────────────

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: "kafka:9092"
      KEEP_VERSIONS: "50"
    restart: unless-stopped
#__________services_____

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  model-storage:
